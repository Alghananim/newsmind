  - {id: us.core_pce, label: "Core PCE Deflator", country: US, currency: USD, tier: 1, channel: rates, pip_per_sigma: 25, decay_hours: 4, halt_minus_min: 30, halt_plus_min: 30, direction_rule: usd_positive_on_beat, source_primary: bea_rss}
