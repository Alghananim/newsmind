unscheduled:
  - id: gp.war_outbreak
    label: "Geopolitical War Outbreak"
    trigger: keyword_match
    keywords: [war, invasion, missile strike, airstrike, military offensive]
    exclude_keywords: [war on inflation, war of words, price war]
    min_sources: 2
    source_tiers: [S, A]
    tier: 1
    channel: safe_haven
    default_direction: usd_bullish_risk_off
    default_pip: 150

  - id: gp.bank_failure
    label: "Banking System Stress"
    trigger: keyword_match
    keywords: [bank run, insolvent, bailout, liquidity crisis]
    min_sources: 2
    source_tiers: [S, A]
    tier: 1
    channel: safe_haven
    default_direction: usd_bullish_risk_off
    default_pip: 120

  - id: gp.tariff_announce
    label: "Tariff / Trade War Announcement"
    trigger: keyword_match
    keywords: [new tariff, trade war, export control, retaliatory tariff]
    and_keywords:
      - [Trump, tariff]
      - [POTUS, tariff]
      - [Truth Social, tariff]
    min_sources: 2
    source_tiers: [S, A]
    tier: 2
    channel: growth
    default_direction: usd_bullish_risk_off
    default_pip: 50

  - id: gp.potus_fed_attack
    label: "Presidential Fed Criticism"
    trigger: keyword_match
    keywords: [fire Powell, replace Powell]
    and_keywords:
      - [Trump, Powell]
      - [Trump, Fed]
    exclude_keywords: [Powell speaks, Powell said]
    min_sources: 1
    source_tiers: [S]
    tier: 2
    channel: rates
    default_direction: usd_bullish_risk_off
    default_pip: 40

  - id: gp.iran_israel_escalation
    label: "Iran-Israel Military Escalation"
    trigger: keyword_match
    keywords: [Iranian missile, IRGC attack, Strait of Hormuz, Israeli airstrike]
    and_keywords:
      - [Iran, Israel, strike]
      - [Hezbollah, strike]
    min_sources: 2
    source_tiers: [S, A]
    tier: 1
    channel: safe_haven
    default_direction: usd_bullish_risk_off
    default_pip: 120
