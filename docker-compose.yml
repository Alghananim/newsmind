version: "3.9"

services:
  newsmind:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newsmind
    restart: unless-stopped
    environment:
      # ---- core loop ----------------------------------------------
      - POLL_INTERVAL_SEC=60
      - CHECKPOINT_EVERY_CYCLES=5
      - BRIEFING_EVERY_CYCLES=60
      - PAIR=EUR/USD
      - STATE_DIR=/app/NewsMind/state

      # ---- LLM (OpenAI) -------------------------------------------
      # The actual key value MUST be provided via Hostinger UI
      # (Settings -> Environment Variables) or a sibling .env file —
      # never commit the real value to git.
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_MODEL=gpt-5
      - ENABLE_LLM=auto                 # auto = on if OPENAI_API_KEY is set
      - INJECTION_LANGUAGE=en           # "en" or "ar"

      # ---- optional integrations ----------------------------------
      # Telegram fills/closures notifications (GateMind):
      # - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      # - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      # Twitter API credentials for RSSHub (NewsMind):
      # - TWITTER_AUTH_TOKEN=${TWITTER_AUTH_TOKEN}

    volumes:
      - newsmind_state:/app/NewsMind/state
    networks:
      - newsmind_net
      - rsshub_net          # external: reach RSSHub on same host
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  newsmind_net:
    driver: bridge
  rsshub_net:
    external: true
    name: rsshub-cs4k_default

volumes:
  newsmind_state:
