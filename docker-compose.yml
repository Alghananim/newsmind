version: "3.9"

services:
  newsmind:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: newsmind
    restart: unless-stopped
    environment:
      # ---- core loop ----------------------------------------------
      - POLL_INTERVAL_SEC=60
      - CHECKPOINT_EVERY_CYCLES=5
      - BRIEFING_EVERY_CYCLES=60
      - PAIR=EUR/USD
      - STATE_DIR=/app/NewsMind/state

      # ---- LLM (OpenAI) -------------------------------------------
      # The actual key value MUST be provided via Hostinger UI
      # (Settings -> Environment Variables) or a sibling .env file —
      # never commit the real value to git.
      # The `:-` syntax means "default to empty string when unset" so
      # the container boots in mechanical-only mode if no key is set.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-5}
      - ENABLE_LLM=${ENABLE_LLM:-auto}            # auto = on if OPENAI_API_KEY set
      - INJECTION_LANGUAGE=${INJECTION_LANGUAGE:-en}

      # ---- OANDA (live data + broker) -----------------------------
      # Same posture as OPENAI_API_KEY — provided via Hostinger UI,
      # never committed to git. Use the practice account first.
      - OANDA_API_TOKEN=${OANDA_API_TOKEN:-}
      - OANDA_ACCOUNT_ID=${OANDA_ACCOUNT_ID:-}
      - OANDA_ENVIRONMENT=${OANDA_ENVIRONMENT:-practice}
      - OANDA_GRANULARITY=${OANDA_GRANULARITY:-M15}
      - ENABLE_OANDA=${ENABLE_OANDA:-auto}        # auto = on if both vars set

      # ---- optional integrations ----------------------------------
 