name: Connectivity Test (OANDA + OpenAI)
# Verifies API keys work without exposing values to logs.
# Reads each key from its dedicated GitHub Secret (no bundle parsing).

on:
  push:
    paths:
      - .github/workflows/connectivity_test.yml
  workflow_dispatch:

jobs:
  connectivity:
    runs-on: ubuntu-latest
    env:
      OANDA_API_TOKEN: ${{ secrets.OANDA_API_TOKEN }}
      OANDA_ACCOUNT_ID: ${{ secrets.OANDA_ACCOUNT_ID }}
      OANDA_ENVIRONMENT: ${{ secrets.OANDA_ENVIRONMENT }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}
    steps:
      - uses: actions/checkout@v4

      - name: Test OANDA connectivity
        run: |
          if [ -z "$OANDA_API_TOKEN" ] || [ -z "$OANDA_ACCOUNT_ID" ]; then
            echo "[SKIP] OANDA secrets not present"
            exit 0
          fi
          ENV_HOST="${OANDA_ENVIRONMENT:-practice}"
          if [ "$ENV_HOST" = "live" ]; then
            HOST="api-fxtrade.oanda.com"
          else
            HOST="api-fxpractice.oanda.com"
          fi
          echo "[oanda] testing $ENV_HOST account..."
          STATUS=$(curl -sS -o /tmp/oanda_resp -w "%{http_code}" \
            -H "Authorization: Bearer $OANDA_API_TOKEN" \
            "https://$HOST/v3/accounts/$OANDA_ACCOUNT_ID/summary" || echo "fail")
          echo "[oanda] status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            python3 -c "import json; d=json.load(open('/tmp/oanda_resp'))['account']; print(f'[oanda] OK currency={d[\"currency\"]} balance={d[\"balance\"]} env=$ENV_HOST')"
          else
            echo "[oanda] FAIL"
            head -c 500 /tmp/oanda_resp || true
            exit 1
          fi

      - name: Test OpenAI connectivity
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "[FAIL] OPENAI_API_KEY secret is missing — please add it at:"
            echo "       https://github.com/Alghananim/newsmind/settings/secrets/actions/new"
            exit 1
          fi
          MODEL="${LLM_MODEL:-gpt-4o-mini}"
          echo "[openai] testing model=$MODEL..."
          STATUS=$(curl -sS -o /tmp/oai_resp -w "%{http_code}" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"$MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"Reply with: ok\"}],\"max_tokens\":5}" \
            "https://api.openai.com/v1/chat/completions" || echo "fail")
          echo "[openai] status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            python3 -c "import json; d=json.load(open('/tmp/oai_resp')); print(f'[openai] OK model={d.get(\"model\",\"?\")} reply={d[\"choices\"][0][\"message\"][\"content\"][:30]!r}')"
          else
            echo "[openai] FAIL — response:"
            python3 -c "import json,sys; d=json.load(open('/tmp/oai_resp')); print(d.get('error',{}).get('message','unknown')[:300])" || head -c 300 /tmp/oai_resp
            exit 1
          fi

      - name: Summary
        run: |
          echo "============================="
          echo "Connectivity test PASSED"
          echo "============================="
