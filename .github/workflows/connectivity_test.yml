name: Connectivity Test (OANDA + OpenAI)
# Verifies API keys work without exposing values to logs.
# Reads ALL_API_KEYS_AND_TOKENS secret which should be in KEY=VALUE format:
#   OANDA_API_TOKEN=...
#   OANDA_ACCOUNT_ID=...
#   OANDA_ENVIRONMENT=practice
#   OPENAI_API_KEY=...

on:
  workflow_dispatch:

jobs:
  connectivity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse secret into env vars
        run: |
          while IFS='=' read -r key val; do
            key=$(echo "$key" | tr -d '[:space:]')
            [ -z "$key" ] && continue
            [[ "$key" == \#* ]] && continue
            echo "::add-mask::$val"
            echo "$key=$val" >> "$GITHUB_ENV"
            echo "[OK] loaded key: $key (length=${#val})"
          done <<< "${{ secrets.ALL_API_KEYS_AND_TOKENS }}"

      - name: Test OANDA connectivity
        run: |
          if [ -z "$OANDA_API_TOKEN" ] || [ -z "$OANDA_ACCOUNT_ID" ]; then
            echo "[SKIP] OANDA keys not in secret"
            exit 0
          fi
          ENV_HOST="${OANDA_ENVIRONMENT:-practice}"
          if [ "$ENV_HOST" = "live" ]; then
            HOST="api-fxtrade.oanda.com"
          else
            HOST="api-fxpractice.oanda.com"
          fi
          echo "[oanda] testing $ENV_HOST account..."
          STATUS=$(curl -sS -o /tmp/oanda_resp -w "%{http_code}" \
            -H "Authorization: Bearer $OANDA_API_TOKEN" \
            "https://$HOST/v3/accounts/$OANDA_ACCOUNT_ID/summary" || echo "fail")
          echo "[oanda] status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            python3 -c "import json; d=json.load(open('/tmp/oanda_resp'))['account']; print(f'[oanda] OK currency={d[\"currency\"]} balance={d[\"balance\"]} env=$ENV_HOST')"
          else
            echo "[oanda] FAIL — check token/account ID"
            head -c 500 /tmp/oanda_resp || true
            exit 1
          fi

      - name: Test OpenAI connectivity
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "[SKIP] OPENAI_API_KEY not in secret"
            exit 0
          fi
          MODEL="${LLM_MODEL:-gpt-4o-mini}"
          echo "[openai] testing model=$MODEL..."
          STATUS=$(curl -sS -o /tmp/oai_resp -w "%{http_code}" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"$MODEL\",\"messages\":[{\"role\":\"user\",\"content\":\"Reply with the single word: ok\"}],\"max_tokens\":5}" \
            "https://api.openai.com/v1/chat/completions" || echo "fail")
          echo "[openai] status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            python3 -c "import json; d=json.load(open('/tmp/oai_resp')); print(f'[openai] OK model={d.get(\"model\",\"?\")} reply={d[\"choices\"][0][\"message\"][\"content\"][:30]!r}')"
          else
            echo "[openai] FAIL — checking response..."
            python3 -c "import json; d=json.load(open('/tmp/oai_resp')); print(d.get('error',{}).get('message','unknown')[:300])" || head -c 300 /tmp/oai_resp
            exit 1
          fi

      - name: Summary
        run: |
          echo "============================="
          echo "Connectivity test complete"
          echo "============================="
